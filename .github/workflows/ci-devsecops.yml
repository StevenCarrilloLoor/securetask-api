name: CI DevSecOps (build, tests y SAST)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Permisos mínimos necesarios; security-events:write permite subir SARIF a Code Scanning
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # 1) Construcción + pruebas unitarias
  build-test:
    name: Build & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ejecutar pruebas (pytest)
        run: pytest -q

  # 2) SAST principal: CodeQL (motor nativo de GitHub, resultados en la pestaña Security)
  codeql:
    name: SAST - CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended

      - name: Analizar con CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  # 3) Segundo SAST: Semgrep (genera SARIF como ARTEFACTO descargable + Code Scanning)
  semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Escanear con Semgrep (SARIF)
        continue-on-error: true
        run: |
          semgrep scan \
            --config=p/default \
            --config=p/python \
            --config=p/security-audit \
            --config=.semgrep.yml \
            --sarif --output semgrep.sarif \
            --metrics=off

      - name: Reporte legible de Semgrep (texto)
        continue-on-error: true
        run: |
          semgrep scan \
            --config=p/default --config=p/python --config=p/security-audit --config=.semgrep.yml \
            --metrics=off | tee semgrep-report.txt

      - name: Subir artefacto SAST (retroalimentación de la herramienta)
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sast-report
          path: |
            semgrep.sarif
            semgrep-report.txt

      - name: Subir SARIF a Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # 4) Tercer SAST (Python): Bandit -> reporte como ARTEFACTO descargable
  bandit:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar Bandit
        run: pip install bandit
      - name: Ejecutar Bandit (SAST)
        continue-on-error: true
        run: |
          bandit -r app/ -f txt  -o bandit-report.txt  || true
          bandit -r app/ -f json -o bandit-report.json || true
      - name: Subir artefacto SAST (Bandit)
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: |
            bandit-report.txt
            bandit-report.json

  # 5) Bonus DevSecOps: escaneo de secretos con GitLeaks
  gitleaks:
    name: Secret Scanning - GitLeaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
